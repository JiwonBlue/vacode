<!--@layout(/layout/basic/sub_layout.html)-->

<div class="VACODE_layout">
    <aside class="VACODE_sidebar">
        <div class="sidebar_filter_menu">
            <a href="/product/list.html?cate_no=45" class="filter_btn active">ALL</a>
            <a href="/product/list.html?cate_no=46" class="filter_btn" data-filter="indoor">INDOOR</a>
            <a href="/product/list.html?cate_no=47" class="filter_btn" data-filter="outdoor">OUTDOOR</a>
        </div>
        <div class="info_footer">
            <p>vacode00@naver.com</p>
            <p>F. 010-4738-8278</p>
        </div>
    </aside>

    <main class="VACODE_contents sub_contents">
        <!-- 카페24 상품 분류 목록 정규 패키지 -->
        <div module="product_listcategory" class="ec-base-product">
            <!--
                $count = 30
                $basket_result = /product/add_basket.html
                $toast_result = /product/add_basket2.html
            -->
            
            <!-- 일반상품 영역 포트폴리오 노출 서브모듈 -->
            <div module="product_listnormal">
                <ul class="portfolio_grid prdList">
                    <!--
                        $count = 30
                    -->
                    <li id="anchorBoxId_{$product_no}" class="portfolio_item" data-category="{$category_name}">
                        <a href="/product/detail.html{$param}" class="portfolio_item_link">
                            <img src="{$image_medium}" class="portfolio_thumb" alt="{$product_name}">
                            <div class="portfolio_info">
                                <div class="pf_title">{$product_name}</div>
                                <div class="pf_link">VIEW MORE &gt;</div>
                            </div>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 등록된 상품(포트폴리오)이 없을 때 예외 처리 -->
            <div module="product_empty" style="grid-column: span 2; width: 100%;">
                <div style="display: flex; align-items: center; justify-content: center; background: #F5F5F6; border-radius: 4px; padding: 100px 0; border: 1px solid #eaeaea; width: 100%;">
                    <p style="color: #838383; font-size: 16px; font-weight: bold;">등록된 포트폴리오가 없습니다.</p>
                </div>
            </div>
        </div>
    </main>
</div>

<style>
    /* 서브 콘텐츠 상단 여백 보정 (포트폴리오 상세와 1:1 일치) */
    .VACODE_contents.sub_contents {
        padding-top: 20px !important;
    }

    /* 포트폴리오 리스트 그리드 강제 재정의 (ul, li 대응) */
    .ec-base-product ul.portfolio_grid.prdList {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 30px !important;
        list-style: none !important;
        padding: 0 !important;
        margin: 0 !important;
    }
    
    .ec-base-product ul.portfolio_grid.prdList > li.portfolio_item {
        position: relative !important;
        overflow: hidden !important;
        border: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: none !important;
        float: none !important;
        width: 100% !important;
        height: auto !important;
        max-width: none !important;
        box-sizing: border-box !important;
    }
    
    .portfolio_item_link {
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        position: relative !important;
        color: inherit !important;
        text-decoration: none !important;
    }
    
    .portfolio_item_link .portfolio_thumb {
        width: 100% !important;
        aspect-ratio: 700 / 495 !important;
        object-fit: cover !important;
        transition: transform 0.4s ease !important;
        filter: brightness(0.85); /* 원본과 동일하게 기본 밝기 낮춤 */
    }
    
    .portfolio_item_link:hover .portfolio_thumb {
        transform: scale(1.03) !important;
    }
    
    .portfolio_item_link .portfolio_info {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        padding: 35px !important;
        background: rgba(0, 0, 0, 0.6) !important;
        color: #FFFFFF !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        opacity: 0 !important;
        transition: opacity 0.3s ease !important;
        border-radius: 4px !important;
        box-sizing: border-box !important;
        pointer-events: none; /* 클릭 방해 방지 */
    }
    
    .portfolio_item_link:hover .portfolio_info {
        opacity: 1 !important;
    }
    
    @media (max-width: 1024px) {
        ul.portfolio_grid {
            grid-template-columns: 1fr !important;
        }
    }

    /* 카테고리 전환 시 부드러운 페이드인 애니메이션 */
    @keyframes portfolioFadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .portfolio_item {
        animation: portfolioFadeIn 0.4s ease forwards;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        let cateNo = urlParams.get('cate_no');
        const filterButtons = document.querySelectorAll('.filter_btn');
        
        // ALL 기본 처리 (파라미터가 없거나 cate_no가 45번일 때 ALL로 간주)
        if (!cateNo) {
            cateNo = '45';
        }
        
        filterButtons.forEach(btn => {
            btn.classList.remove('active');
            const href = btn.getAttribute('href');
            if (href.includes('cate_no=' + cateNo)) {
                btn.classList.add('active');
            }
        });

        // 방어 코드: 상품이 존재하면 '등록된 포트폴리오가 없습니다' 예외 처리 상자를 DOM에서 강제 삭제
        const items = document.querySelectorAll('.portfolio_grid .portfolio_item');
        if (items.length > 0) {
            const emptyContainers = document.querySelectorAll('[module="product_empty"], .xans-product-empty');
            emptyContainers.forEach(box => {
                box.remove();
            });
        }

        // 방어 코드 2: 동일한 상품 ID(anchorBoxId_XX)를 가진 중복 카드가 있을 경우 첫 번째만 남기고 즉각 제거
        const seenIds = {};
        const portfolioItems = document.querySelectorAll('.portfolio_grid .portfolio_item');
        portfolioItems.forEach(item => {
            const itemId = item.getAttribute('id');
            if (itemId) {
                if (seenIds[itemId]) {
                    item.remove();
                } else {
                    seenIds[itemId] = true;
                }
            }
        });
    });
</script>
