<!--@layout(/layout/basic/sub_layout.html)-->

<div class="VACODE_layout">
    <aside class="VACODE_sidebar">
        <div class="sidebar_filter_menu">
            <a href="#" class="filter_btn active" data-filter="all">ALL</a>
            <a href="#" class="filter_btn" data-filter="indoor">INDOOR</a>
            <a href="#" class="filter_btn" data-filter="outdoor">OUTDOOR</a>
        </div>
        <div class="info_footer">
            <p>vacode00@naver.com</p>
            <p>F. 010-4738-8278</p>
        </div>
    </aside>

    <main class="VACODE_contents sub_contents">
        <!-- 카페24 갤러리 게시판 8번 목록 연동 패키지 -->
        <div module="board_listpackage_8">
            <!--
                $count = 30
                $subject_cut = 100
                $target = _self
            -->
            <div class="portfolio_grid">
                <div module="board_list_8" class="portfolio_item" data-category="{$category_name}" onclick="location.href='/VACODE/portfolio_detail.html{$param_read}'" style="cursor: pointer;">
                    <a href="/VACODE/portfolio_detail.html{$param_read}" style="display: block; width: 100%; height: 100%; color: inherit; text-decoration: none; position: relative; overflow: hidden; border-radius: 4px; line-height: 0;">
                        <img src="{$img_src}" class="portfolio_thumb" alt="{$subject}">
                        <div class="portfolio_info">
                            <div class="pf_title">{$subject}</div>
                            <div class="pf_link">VIEW MORE &gt;</div>
                        </div>
                    </a>
                </div>

                <!-- 게시글이 없을 때 예외 처리 (board_listpackage_8 내부) -->
                <div module="board_empty_8" style="grid-column: span 2; width: 100%;">
                    <div style="display: flex; align-items: center; justify-content: center; background: #F5F5F6; border-radius: 4px; padding: 100px 0; border: 1px solid #eaeaea; width: 100%;">
                        <p style="color: #838383; font-size: 16px; font-weight: bold;">등록된 포트폴리오가 없습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<style>
    /* 서브 콘텐츠 상단 여백 보정 (포트폴리오 상세와 1:1 일치) */
    .VACODE_contents.sub_contents {
        padding-top: 20px !important;
    }

    /* 카테고리 전환 시 부드러운 페이드인 애니메이션 */
    @keyframes portfolioFadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .portfolio_item {
        animation: portfolioFadeIn 0.4s ease forwards;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const filterButtons = document.querySelectorAll('.filter_btn');
        const portfolioItems = document.querySelectorAll('.portfolio_item');

        filterButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();

                filterButtons.forEach(btn => {
                    btn.classList.remove('active');
                });
                this.classList.add('active');

                const filterValue = this.getAttribute('data-filter').toLowerCase();

                portfolioItems.forEach(item => {
                    const category = (item.getAttribute('data-category') || '').toLowerCase();
                    if (filterValue === 'all' || category === filterValue || category.indexOf(filterValue) !== -1) {
                        item.style.display = 'block';
                        item.style.animation = 'none';
                        item.offsetHeight; // reflow
                        item.style.animation = null;
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });
    });
</script>
