<!--@layout(/layout/basic/sub_layout.html)-->

<style>
    .VACODE_contents.sub_contents {
        padding-top: 20px !important;
    }

    .contact_header_txt {
        font-size: 30px !important;
        font-weight: bold !important;
        line-height: 1.45 !important;
        letter-spacing: -0.2px !important;
        color: var(--vc-black) !important;
        margin-bottom: 40px !important;
    }

    .contact_info_layout {
        background: transparent !important;
        padding: 0 !important;
        margin-bottom: 50px !important;
    }

    .contact_map_placeholder {
        width: 50%;
        height: 280px !important;
    }

    .contact_meta_info {
        padding: 20px 0 20px 40px !important;
        justify-content: center !important;
        gap: 30px !important;
        overflow: hidden !important;
    }

    .form_group {
        margin-bottom: 20px !important;
        padding: 5px 0 !important;
    }
    .form_label {
        font-size: 20px !important;
        font-weight: 700 !important;
        margin-bottom: 5px !important;
        color: var(--vc-black) !important;
    }
    .form_input {
        height: 60px !important;
        padding: 10px 0 !important;
        font-size: 16px !important;
    }
    .form_textarea {
        height: 140px !important;
    }

    @media (max-width: 1024px) {
        .contact_map_placeholder {
            width: 100% !important;
            height: 250px !important;
        }
        .contact_meta_info {
            padding: 20px 0 !important;
        }
    }
</style>

<div class="VACODE_layout">
    <aside class="VACODE_sidebar">
        <div>
            <h1 class="slogan_title">기획부터 시공까지<br />공간의 완성도를<br />기준으로.</h1>
        </div>
        <div class="info_footer">
            <p>vacode00@naver.com</p>
            <p>F. 010-4738-8278</p>
        </div>
    </aside>

    <main class="VACODE_contents sub_contents">
        <p class="contact_header_txt">남겨주신 문의를 바탕으로 공간의 가치를 높이는 최적의 솔루션을 안내하겠습니다.</p>
        
        <div class="contact_info_layout">
            <div class="contact_map_placeholder" style="border-radius: 4px; overflow: hidden;">
                <iframe src="https://maps.google.com/maps?q=%EA%B2%BD%EA%B8%B0%EB%8F%84%20%EA%B9%80%ED%8F%AC%EC%8B%9C%20%EC%96%91%EC%B1%A4%EC%9D%8D%20%EB%93%AC%EB%B0%95%EB%A1%9C%2033-16&t=&z=16&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <div class="contact_meta_info" style="position: relative; overflow: visible;">
                <!-- 대형 contact 블러 효과 배경 텍스트 (140px, blur ~3px) -->
                <div style="position: absolute; top: -15px; left: 0; transform: none; font-size: 140px; font-weight: 900; color: rgba(0, 0, 0, 0.03); filter: blur(3px); z-index: -1; user-select: none; pointer-events: none; text-transform: uppercase; font-family: sans-serif; line-height: 1;">CONTACT</div>
                
                <div class="meta_row"><h5>상담 시간</h5><p>09:00 ~ 18:00</p></div>
                <div class="meta_row"><h5>주소</h5><p>경기 김포시 양촌읍 듬박로 33-16</p></div>
            </div>
        </div>

        <form id="contact_form" class="contact_form_aligned" onsubmit="alert('문의가 전송되었습니다.'); return false;">
            <div class="form_group"><label class="form_label">COMPANY NAME</label><input type="text" class="form_input" placeholder="업체명을 입력해 주세요" required></div>
            <div class="form_group"><label class="form_label">ADDRESS</label><input type="text" class="form_input" placeholder="주소를 입력해 주세요" required></div>
            <div class="form_group"><label class="form_label">CONTACT ADDRESS</label><input type="tel" class="form_input" placeholder="연락처를 입력해 주세요" required></div>
            <div class="form_group"><label class="form_label">E-MAIL</label><input type="email" class="form_input" placeholder="이메일을 입력해 주세요" required></div>
            <div class="form_group"><label class="form_label">CONTENTS</label><textarea class="form_input form_textarea" placeholder="내용을 입력해 주세요" required></textarea></div>
            <button type="submit" class="form_submit_btn"><span>SEND &gt;</span></button>
        </form>
    </main>
</div>
