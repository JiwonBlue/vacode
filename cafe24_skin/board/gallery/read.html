<!--@layout(/layout/basic/sub_layout.html)-->

<style>
    #VACODE_header,
    #VACODE_footer {
        display: none !important;
    }
    body {
        padding-top: 0 !important;
    }
</style>

<div class="board_manage_wrapper" style="max-width: 960px; margin: 40px auto 120px auto; padding: 0 20px;">
    <main class="VACODE_contents" style="margin-left: 0 !important; max-width: 100% !important; padding: 0 !important;">
        <div class="section" module="board_readpackage_8">
            <div module="board_read_8">
                <!--
                    $delete_success_url = /board/gallery/list.html
                    $login_page_url = /member/login.html
                    $deny_access_url = /board/gallery/list.html
                -->
                
                <!-- 본문 이미지 핀터레스트(Masonry) 흐름 정렬 -->
                <div class="masonry_grid">
                    {$content}
                </div>

                <!-- 하단 컨트롤 버튼 영역 -->
                <div class="ec-base-button gBottom" style="margin-top: 50px;">
                    <span class="gLeft">
                        <a href="#none" onclick="if (!confirm('정말 이 포트폴리오 게시글을 삭제하시겠습니까?')) return false; {$action_delete}" class="btnNormalFix sizeM {$delete_button_auth|display}">삭제</a>
                        <a href="/board/gallery/modify.html{$param_modify}" class="btnNormalFix sizeM {$modify_button_auth|display}">수정</a>
                    </span>
                    <span class="gRight">
                        <a href="{$link_board_list}" class="btnSubmitFix sizeM">목록</a>
                    </span>
                </div>
            </div>
        </div>
    </main>
</div>
