<!--@layout(/layout/basic/sub_layout.html)-->

<style>
    #VACODE_header,
    #VACODE_footer {
        display: none !important;
    }
    body {
        padding-top: 0 !important;
        background: #fbfbfb;
    }

    .board_manage_wrapper {
        max-width: 1040px;
        margin: 40px auto 120px auto;
        padding: 40px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }

    .board_list_table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 25px;
        border-top: 2px solid #111111;
    }
    .board_list_table th {
        background: #f8fafc;
        padding: 15px 12px;
        font-size: 14px;
        font-weight: 700;
        color: #1e293b;
        border-bottom: 1px solid #cbd5e1;
        text-align: center;
    }
    .board_list_table td {
        padding: 14px 12px;
        font-size: 14px;
        color: #334155;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
    }
    .board_list_table tr.clickable_row:hover td {
        background: #f1f5f9;
    }
    .board_list_table .thumb_box {
        width: 64px;
        height: 44px;
        overflow: hidden;
        border-radius: 4px;
        background: #f1f5f9;
        display: inline-block;
        vertical-align: middle;
        border: 1px solid #e2e8f0;
    }
    .board_list_table .thumb_img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .board_list_table .post_title {
        color: #0f172a;
        font-weight: 600;
        font-size: 15px;
        transition: color 0.2s ease;
    }
    .board_list_table tr.clickable_row:hover .post_title {
        color: #2563eb;
        text-decoration: underline;
    }
    .board_list_table .category_badge {
        display: inline-block;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 12px;
        background: #f1f5f9;
        color: #475569;
        border: 1px solid #cbd5e1;
    }

    .write_btn_main {
        display: inline-block;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 700;
        background: #0f172a;
        color: #ffffff !important;
        text-decoration: none !important;
        border-radius: 4px;
        transition: background 0.2s ease;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    .write_btn_main:hover {
        background: #334155;
    }
</style>

<div class="board_manage_wrapper">
    <main class="VACODE_contents" style="margin-left: 0 !important; max-width: 100% !important; padding: 0 !important;">
        <!-- 카페24 포트폴리오 갤러리 게시판 8번 패키지 모듈 -->
        <div module="board_listpackage_8">
            <!--
                $count = 15
                $subject_cut = 100
                $target = _self
            -->

            <div module="board_title_8">
                <div class="titleArea" style="margin-bottom: 25px; border-bottom: 2px solid #0f172a; padding-bottom: 15px;">
                    <h2 style="font-size: 24px; font-weight: 800; color: #0f172a; margin: 0;">포트폴리오 갤러리 관리 목록</h2>
                </div>
            </div>

            <!-- INDOOR / OUTDOOR 카테고리 필터 구분 및 상단 우측 [글쓰기] 버튼 -->
            <div class="boardSort" style="margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
                <div style="font-size: 15px; font-weight: 700; color: #334155; display: flex; align-items: center; gap: 8px;">
                    <span>카테고리 구분:</span>
                    <span module="board_category_8">{$form.board_category}</span>
                </div>

                <!-- 상단 우측 글쓰기 버튼 -->
                <div style="text-align: right;">
                    <a href="/board/gallery/write.html?board_no=8" class="write_btn_main">+ 새 포트폴리오 글쓰기</a>
                </div>
            </div>

            <!-- 목록 표 (분류, 대표사진, 제목 3개 열 구성 & 행 전체 클릭 연결) -->
            <table class="board_list_table">
                <colgroup>
                    <col style="width: 160px;" />
                    <col style="width: 110px;" />
                    <col style="width: auto;" />
                </colgroup>
                <thead>
                    <tr>
                        <th scope="col">분류</th>
                        <th scope="col">대표사진</th>
                        <th scope="col">제목</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 게시물 리스트 반복 (행 전체 클릭 시 게시글로 이동) -->
                    <tr module="board_list_8" class="clickable_row" onclick="location.href='/board/gallery/read.html{$param_read}'" style="cursor: pointer;">
                        <td style="text-align: center;">
                            <span class="category_badge">{$category_name}</span>
                        </td>
                        <td style="text-align: center;">
                            <span class="thumb_box">
                                <img src="{$img_src}" class="thumb_img" alt="{$subject}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'64\' height=\'44\' viewBox=\'0 0 64 44\'><rect width=\'64\' height=\'44\' fill=\'%23f1f5f9\'/><text x=\'50%25\' y=\'50%25\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%2394a3b8\' font-size=\'10\'>No Image</text></svg>';">
                            </span>
                        </td>
                        <td style="text-align: left;">
                            <span class="post_title">{$subject}</span>
                        </td>
                    </tr>

                    <!-- 게시글이 없을 때 예외 처리 -->
                    <tr module="board_empty_8">
                        <td colspan="3" style="text-align: center; padding: 80px 0; color: #94a3b8; font-size: 15px; font-weight: 700;">
                            등록된 포트폴리오 게시글이 없습니다.
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 페이지네이션 -->
            <div module="board_paging_8" class="ec-base-paginate" style="margin-top: 30px;">
                <a href="{$param_prev}">이전 페이지</a>
                <ol>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                </ol>
                <a href="{$param_next}">다음 페이지</a>
            </div>

        </div>
    </main>
</div>
