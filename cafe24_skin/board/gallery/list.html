<!--@layout(/layout/basic/sub_layout.html)-->

<style>
    #VACODE_header,
    #VACODE_footer {
        display: none !important;
    }
    body {
        padding-top: 0 !important;
    }

    .gallery_admin_card {
        border: 1px solid #eaeaea;
        background: #ffffff;
        border-radius: 0 !important;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: box-shadow 0.2s ease;
    }
    .gallery_admin_card:hover {
        box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }
    .gallery_admin_card .card_link {
        display: block;
        text-decoration: none;
        color: inherit;
    }
    .gallery_admin_card .card_thumb {
        width: 100%;
        aspect-ratio: 700 / 495;
        object-fit: cover;
        display: block;
        background: #f4f4f4;
    }
    .gallery_admin_card .card_body {
        padding: 18px 20px 14px 20px;
    }
    .gallery_admin_card .card_title {
        font-size: 16px;
        font-weight: bold;
        color: #111111;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .gallery_admin_card .card_meta {
        font-size: 13px;
        color: #888888;
    }
    .gallery_admin_card .card_actions {
        display: flex;
        border-top: 1px solid #f0f0f0;
        background: #fafafa;
    }
    .gallery_admin_card .card_actions a {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        font-size: 13px;
        font-weight: bold;
        text-decoration: none;
        color: #444444;
        transition: background 0.2s ease;
    }
    .gallery_admin_card .card_actions a:first-child {
        border-right: 1px solid #f0f0f0;
    }
    .gallery_admin_card .card_actions a.btn_delete {
        color: #e53e3e;
    }
    .gallery_admin_card .card_actions a:hover {
        background: #f0f0f0;
    }
</style>

<div class="board_manage_wrapper" style="max-width: 960px; margin: 40px auto 120px auto; padding: 0 20px;">
    <main class="VACODE_contents" style="margin-left: 0 !important; max-width: 100% !important; padding: 0 !important;">
        <div class="section" module="Board_ListPackage_8">
            <div module="board_title_8">
                <div class="path">
                    <ol>
                        <li><a href="/">홈</a></li>
                        <li><a href="#">게시판</a></li>
                        <li title="현재 위치"><strong>{$board_name}</strong></li>
                    </ol>
                </div>

                <div class="titleArea" style="margin-bottom: 25px;">
                    <h2>{$board_title} 관리 목록</h2>
                </div>
            </div>

            <!-- INDOOR / OUTDOOR 카테고리 필터 구분 -->
            <div class="boardSort" style="margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;">
                <div style="font-size: 14px; font-weight: bold; color: #333;">카테고리 선택: <span module="board_category_8">{$form.board_category}</span></div>
            </div>

            <!-- 포트폴리오 갤러리 그리드 리스트 패키지 -->
            <div module="board_listpackage_8">
                <!--
                    $count = 12
                    $subject_cut = 100
                    $target = _self
                -->
                <div class="portfolio_grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-bottom: 40px;">
                    <!-- 게시물 리스트 반복 (갤러리 자체 read.html 연결 및 각 카드별 수정/삭제 버튼 제공) -->
                    <div module="board_list_8" class="gallery_admin_card" data-category="{$category_name}">
                        <a href="/board/gallery/read.html{$param_read}" class="card_link">
                            <img src="{$img_src}" class="card_thumb" alt="{$subject}">
                            <div class="card_body">
                                <div class="card_title">{$subject}</div>
                                <div class="card_meta">분류: {$category_name} | 등록일: {$write_date}</div>
                            </div>
                        </a>
                        
                        <!-- 카드별 개별 수정 / 삭제 버튼 -->
                        <div class="card_actions">
                            <a href="/board/gallery/modify.html{$param_modify}" class="btn_edit">수정</a>
                            <a href="#none" onclick="{$action_delete}" class="btn_delete">삭제</a>
                        </div>
                    </div>

                    <!-- 게시글이 없을 때 예외 처리 -->
                    <div module="board_empty_8" style="grid-column: span 2; width: 100%;">
                        <div style="display: flex; align-items: center; justify-content: center; background: #F5F5F6; border-radius: 4px; padding: 80px 0; border: 1px solid #eaeaea; width: 100%;">
                            <p style="color: #838383; font-size: 16px; font-weight: bold;">등록된 포트폴리오가 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 컨트롤러 & 글쓰기 버튼 -->
            <div class="ec-base-button gBottom" style="margin-bottom: 30px; display: flex; justify-content: flex-end;">
                <a href="/board/gallery/write.html?board_no=8" class="btnSubmitFix sizeM">글쓰기</a>
            </div>

            <!-- 페이지네이션 -->
            <div module="board_paging_8" class="ec-base-paginate">
                <a href="{$param_prev}">이전 페이지</a>
                <ol>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                </ol>
                <a href="{$param_next}">다음 페이지</a>
            </div>

        </div>
    </main>
</div>
