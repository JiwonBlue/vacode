<!--@layout(/layout/basic/sub_layout.html)-->

<style>
    #VACODE_header,
    #VACODE_footer {
        display: none !important;
    }
    body {
        padding-top: 0 !important;
    }

    .board_list_table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
        border-top: 2px solid #111111;
    }
    .board_list_table th {
        background: #f8f9fa;
        padding: 14px 10px;
        font-size: 14px;
        font-weight: 600;
        color: #333333;
        border-bottom: 1px solid #e1e1e1;
        text-align: center;
    }
    .board_list_table td {
        padding: 12px 10px;
        font-size: 14px;
        color: #444444;
        border-bottom: 1px solid #eeeeee;
        vertical-align: middle;
    }
    .board_list_table tr:hover td {
        background: #fbfbfb;
    }
    .board_list_table .thumb_box {
        width: 60px;
        height: 40px;
        overflow: hidden;
        border-radius: 2px;
        background: #eee;
        display: inline-block;
        vertical-align: middle;
    }
    .board_list_table .thumb_img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .board_list_table .post_title {
        color: #111111;
        text-decoration: none;
        font-weight: 500;
    }
    .board_list_table .post_title:hover {
        text-decoration: underline;
    }
    .board_list_table .action_btn {
        display: inline-block;
        padding: 5px 10px;
        font-size: 12px;
        border-radius: 3px;
        text-decoration: none;
        margin: 0 2px;
    }
    .board_list_table .btn_edit {
        background: #f0f0f0;
        color: #333;
        border: 1px solid #ccc;
    }
    .board_list_table .btn_delete {
        background: #fff0f0;
        color: #d93838;
        border: 1px solid #f5c2c2;
    }
    .board_list_table .btn_edit:hover {
        background: #e2e2e2;
    }
    .board_list_table .btn_delete:hover {
        background: #ffe2e2;
    }
</style>

<div class="board_manage_wrapper" style="max-width: 960px; margin: 40px auto 120px auto; padding: 0 20px;">
    <main class="VACODE_contents" style="margin-left: 0 !important; max-width: 100% !important; padding: 0 !important;">
        <div class="section" module="Board_ListPackage_8">
            <div module="board_title_8">
                <div class="path">
                    <ol>
                        <li><a href="/">홈</a></li>
                        <li><a href="#">게시판</a></li>
                        <li title="현재 위치"><strong>{$board_name}</strong></li>
                    </ol>
                </div>

                <div class="titleArea" style="margin-bottom: 25px;">
                    <h2>{$board_title} 관리 목록</h2>
                </div>
            </div>

            <!-- INDOOR / OUTDOOR 카테고리 필터 구분 -->
            <div class="boardSort" style="margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;">
                <div style="font-size: 14px; font-weight: bold; color: #333;">카테고리 선택: <span module="board_category_8">{$form.board_category}</span></div>
            </div>

            <!-- 포트폴리오 갤러리 테이블 리스트 패키지 -->
            <div module="board_listpackage_8">
                <!--
                    $count = 15
                    $subject_cut = 100
                    $target = _self
                -->
                <table class="board_list_table">
                    <colgroup>
                        <col style="width: 70px;" />
                        <col style="width: 120px;" />
                        <col style="width: 80px;" />
                        <col style="width: auto;" />
                        <col style="width: 120px;" />
                        <col style="width: 130px;" />
                    </colgroup>
                    <thead>
                        <tr>
                            <th scope="col">번호</th>
                            <th scope="col">분류</th>
                            <th scope="col">썸네일</th>
                            <th scope="col">제목</th>
                            <th scope="col">작성일</th>
                            <th scope="col">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 게시물 리스트 반복 (테이블 행 방식) -->
                        <tr module="board_list_8">
                            <td style="text-align: center; color: #777;">{$no}</td>
                            <td style="text-align: center; font-weight: 500;">{$category_name}</td>
                            <td style="text-align: center;">
                                <a href="/board/gallery/read.html{$param_read}">
                                    <span class="thumb_box">
                                        <img src="{$img_src}" class="thumb_img" alt="{$subject}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'60\' height=\'40\' viewBox=\'0 0 60 40\'><rect width=\'60\' height=\'40\' fill=\'%23eeeeee\'/><text x=\'50%25\' y=\'50%25\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23aaaaaa\' font-size=\'10\'>No Image</text></svg>';">
                                    </span>
                                </a>
                            </td>
                            <td style="text-align: left;">
                                <a href="/board/gallery/read.html{$param_read}" class="post_title">{$subject}</a>
                            </td>
                            <td style="text-align: center; color: #888888; font-size: 13px;">{$write_date}</td>
                            <td style="text-align: center;">
                                <a href="/board/gallery/modify.html{$param_modify}" class="action_btn btn_edit">수정</a>
                                <a href="#none" onclick="if (!confirm('정말 이 포트폴리오 게시글을 삭제하시겠습니까?')) return false; {$action_delete}" class="action_btn btn_delete">삭제</a>
                            </td>
                        </tr>

                        <!-- 게시글이 없을 때 예외 처리 -->
                        <tr module="board_empty_8">
                            <td colspan="6" style="text-align: center; padding: 80px 0; color: #888888; font-size: 15px; font-weight: bold;">
                                등록된 포트폴리오 게시글이 없습니다.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 하단 컨트롤러 & 글쓰기 버튼 -->
            <div class="ec-base-button gBottom" style="margin-bottom: 30px; display: flex; justify-content: flex-end;">
                <a href="/board/gallery/write.html?board_no=8" class="btnSubmitFix sizeM">글쓰기</a>
            </div>

            <!-- 페이지네이션 -->
            <div module="board_paging_8" class="ec-base-paginate">
                <a href="{$param_prev}">이전 페이지</a>
                <ol>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                </ol>
                <a href="{$param_next}">다음 페이지</a>
            </div>

        </div>
    </main>
</div>
