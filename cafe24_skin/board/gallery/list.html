<!--@layout(/layout/basic/sub_layout.html)-->

<div class="board_manage_wrapper" style="max-width: 960px; margin: 60px auto 120px auto; padding: 0 20px;">
    <main class="VACODE_contents" style="margin-left: 0 !important; max-width: 100% !important; padding: 0 !important;">
        <div class="section" module="Board_ListPackage_8">
            <div module="board_title_8">
                <div class="path">
                    <ol>
                        <li><a href="/">홈</a></li>
                        <li><a href="#">게시판</a></li>
                        <li title="현재 위치"><strong>{$board_name}</strong></li>
                    </ol>
                </div>

                <div class="titleArea" style="margin-bottom: 30px;">
                    <h2>{$board_title}</h2>
                </div>
            </div>

            <div class="boardSort" style="margin-bottom: 30px;">
                <span module="board_category_8">{$form.board_category}</span>
            </div>

            <!-- 포트폴리오 갤러리 그리드 리스트 패키지 -->
            <div module="board_listpackage_8">
                <!--
                    $count = 12
                    $subject_cut = 100
                    $target = _self
                -->
                <div class="portfolio_grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-bottom: 60px;">
                    <!-- 게시물 리스트 반복 -->
                    <div module="board_list_8" class="portfolio_item" data-category="{$category_name}" onclick="location.href='/VACODE/portfolio_detail.html{$param_read}'" style="cursor: pointer;">
                        <a href="/VACODE/portfolio_detail.html{$param_read}" style="display: block; width: 100%; height: 100%; color: inherit; text-decoration: none;">
                            <img src="{$img_src}" class="portfolio_thumb" alt="{$subject}">
                            <div class="portfolio_info">
                                <div class="pf_title">{$subject}</div>
                                <div class="pf_link">VIEW MORE &gt;</div>
                            </div>
                        </a>
                    </div>

                    <!-- 게시글이 없을 때 예외 처리 -->
                    <div module="board_empty_8" style="grid-column: span 2; width: 100%;">
                        <div style="display: flex; align-items: center; justify-content: center; background: #F5F5F6; border-radius: 4px; padding: 100px 0; border: 1px solid #eaeaea; width: 100%;">
                            <p style="color: #838383; font-size: 16px; font-weight: bold;">등록된 포트폴리오가 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 컨트롤러 & 글쓰기 버튼 -->
            <div class="ec-base-button gBottom" style="margin-bottom: 30px;">
                <span class="gRight">
                    <a href="/board/gallery/write.html?board_no=8" class="btnSubmitFix sizeM">글쓰기</a>
                </span>
            </div>

            <!-- 페이지네이션 -->
            <div module="board_paging_8" class="ec-base-paginate">
                <a href="{$param_prev}">이전 페이지</a>
                <ol>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                    <li><a href="{$param_num}" class="{$param_class}">{$page_num}</a></li>
                </ol>
                <a href="{$param_next}">다음 페이지</a>
            </div>

            <!-- 검색 영역 -->
            <div class="boardSearch">
                <fieldset>
                    <legend>게시물 검색</legend>
                    <div class="form">
                        {$form.search_date} {$form.search_key} {$form.search}
                        <a href="#none" class="btnNormal" onclick="{$action_search}">찾기</a>
                    </div>
                </fieldset>
            </div>

        </div>
    </main>
</div>
