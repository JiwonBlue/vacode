<body>

<header id="VARCODE_header">

        <a href="#" target="_blank" aria-label="Naver Blog">
            <img src="../img/그룹 17.svg" alt="Naver Blog" style="width:22px; height:22px; vertical-align:middle;">

        <a href="#" target="_blank" aria-label="Instagram">
            <img src="../img/그룹 14.svg" alt="Instagram" style="width:22px; height:22px; vertical-align:middle;">
        </a>
    </div>
</header>

<div id="VARCODE_wrap">
    <div class="VARCODE_layout">
        <aside class="VARCODE_sidebar">
            <div><h1 class="slogan_title">기획부터 시공까지<br />공간의 완성도를<br />기준으로.</h1></div>
            <div class="info_footer"><p>vacode00@naver.com</p><p>F. 010-4738-8278</p></div>
        </aside>

        <main class="VARCODE_contents sub_contents">
            <h3 class="section_title">CONTACT</h3>
            <p class="contact_header_txt">남겨주신 문의를 바탕으로 공간의 가치를 높이는 최적의 솔루션을 안내하겠습니다.</p>
            
            <div class="contact_info_layout">
                <div class="contact_map_placeholder" style="border-radius: 4px; overflow: hidden;">
                    <iframe src="https://maps.google.com/maps?q=%EA%B2%BD%EA%B8%B0%EB%8F%84%20%EA%B9%80%ED%8F%AC%EC%8B%9C%20%EC%96%91%EC%B1%A4%EC%9D%8D%20%EB%93%AC%EB%B0%95%EB%A1%9C%2033-16&t=&z=16&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <div class="contact_meta_info">
                    <div class="meta_row"><h5>상담 시간</h5><p>09:00 ~ 18:00</p></div>
                    <div class="meta_row"><h5>주소</h5><p>경기 김포시 양촌읍 듬박로 33-16</p></div>
                </div>
            </div>

            <form id="contact_form" onsubmit="alert('문의가 전송되었습니다.'); return false;">
                <div class="form_group"><label class="form_label">+ COMPANY NAME</label><input type="text" class="form_input" placeholder="업체명을 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ ADDRESS</label><input type="text" class="form_input" placeholder="주소를 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ CONTACT ADDRESS</label><input type="tel" class="form_input" placeholder="연락처를 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ E-MAIL</label><input type="email" class="form_input" placeholder="이메일을 입력해 주세요" required></div>
                <div class="form_group"><label class="form_label">+ CONTENTS</label><textarea class="form_input form_textarea" placeholder="내용을 입력해 주세요" required></textarea></div>
                <button type="submit" class="form_submit_btn"><span>SEND &gt;</span></button>
            </form>
        </main>
    </div>
</div>
</div>


</body>
</html>
